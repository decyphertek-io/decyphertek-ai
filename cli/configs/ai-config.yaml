version: "1.0.0"
description: "AI provider configuration for Decyphertek.ai agents"

providers:
  openrouter-ai:
    name: OpenRouter AI
    base_url: https://openrouter.ai/api/v1
    enabled: true
    credential_service: openrouter

default_provider: openrouter-ai

agents:
  adminotaur:
    model: deepseek/deepseek-v3.2
  agent-builder:
    model: deepseek/deepseek-v3.2
  mcp-builder:
    model: deepseek/deepseek-v3.2